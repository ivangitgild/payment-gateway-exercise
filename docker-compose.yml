services:
  app:
    build:
      context: ./docker/php
    container_name: payment_gateway_app
    working_dir: /var/www
    volumes:
      - ./:/var/www

  web:
    image: nginx:alpine
    container_name: payment_gateway_nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
