services:
  app:
    build:
      context: ./docker/php
    container_name: payment_gateway_app
    working_dir: /var/www
    volumes:
      - ./:/var/www

  web:
    image: nginx:alpine
    container_name: payment_gateway_nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
  db:
    image: mysql:8.0
    container_name: payment_gateway_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
volumes:
  dbdata:
